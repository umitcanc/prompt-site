<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Prompt Kopyala</title>
  <style>
    :root { --bg:#000; --btn:#fff; --txt:#000; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap{
      width: min(720px, 92vw);
      display: grid;
      gap: 14px;
      padding: 18px 0;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    button{
      width: 100%;
      border: 0;
      border-radius: 18px;
      background: var(--btn);
      color: var(--txt);
      font-weight: 900;
      letter-spacing: .8px;
      padding: 18px 16px;
      font-size: clamp(16px, 4.5vw, 22px);
      cursor: pointer;
      transition: transform .06s ease, opacity .15s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button:active { transform: scale(0.99); opacity: .92; }
    button:focus { outline: 2px solid rgba(255,255,255,.55); outline-offset: 4px; }

  </style>
</head>
<body>
  <div class="wrap">

    <div class="row">
      <button id="btnKizil">KIZIL PROMPT</button>
      <button id="btnKizilResim">KIZIL RESİM</button>
    </div>

    <div class="row">
      <button id="btnSarisin">SARIŞIN PROMPT</button>
      <button id="btnSarisinResim">SARIŞIN RESİM</button>
    </div>

    <div class="row">
      <button id="btnEsmer">ESMER PROMPT</button>
      <button id="btnEsmerResim">ESMER RESİM</button>
    </div>

  </div>

<script>

const textKizil = `A COMPLETELY NEW image will be created from scratch. DO NOT edit, paint over, or alter the provided images. Generate a new photograph based on the following strict rules:

PERSON IDENTITY, HEAD & HAIR (Take ONLY from Prompt and Image 1):
The person is a young woman with an oval face shape, fair skin with highly detailed natural skin texture, visible pores, and natural skin redness on cheeks. Hazel-green almond eyes, natural unplucked eyebrows. 

HAIR & MAKEUP (CRITICAL STRICT RULE): Auburn copper hair color. The hairstyle, hair length, makeup style, and entire physical appearance of the head MUST come exclusively from Image 1. ABSOLUTELY DO NOT copy the hairstyle, bangs, makeup, eyeliner, glitter, or any facial styling from Image 2.

FACIAL DETAILS: She has a distinct cluster of four small beauty marks on the right side of her chin and lower jawline, and a single prominent mole on the middle of her left cheek. Subtle natural imperfections on the lower face. Natural straight nose, medium natural pink lips with distinct cupid's bow.

BODY TYPE & CLOTHING:
BODY: A soft and curvy hourglass figure. Naturally fuller upper-body proportions. A slim, gently tapered waist creating visible contrast with the upper body and hips. Soft, natural skin texture. 

CLOTHING: The clothing should resemble the garment type in Image 2 but MUST be slightly altered in color. The clothing must perfectly fit the curvy hourglass figure described above.

POSE, EXPRESSION AND ATMOSPHERE (Take ONLY the "Action/Emotion" from Image 2):
Recreate the exact pose, body language, camera angle, and lighting/shadows from Image 2.
 
EMOTION (CRITICAL): Capture the exact facial expression, emotion, and facial muscle tension from Image 2. However, you must apply this pure emotion to the face from Image 1 WITHOUT transferring any artificial makeup or physical styling from Image 2.

ENVIRONMENT (Take from Image 3 if provided, otherwise Image 2):
If a third image is attached, use that specific location as the background environment. If there is no third image, recreate the background style of the second image. The environmental lighting and day/night mood must always match the lighting hitting the person.

Highly detailed, 4k photorealistic.`;


const textSarisin = `A COMPLETELY NEW image will be created from scratch. DO NOT edit, paint over, or alter the provided images. Generate a new photograph based on the following strict rules:

PERSON IDENTITY, HEAD & HAIR (Take ONLY from Prompt and Image 1):
The person is a young woman with an oval face shape, fair skin with natural texture and soft redness on the cheeks. Warm brown almond-shaped eyes, natural medium eyebrows. 

HAIR & MAKEUP (CRITICAL STRICT RULE): Light brown hair with slightly lighter ends, styled half-up. The hairstyle, hair length, makeup style, and entire physical appearance of the head MUST come exclusively from Image 1. ABSOLUTELY DO NOT copy the hairstyle, bangs, makeup, eyeliner, glitter, or any facial styling from Image 2.

FACIAL DETAILS: She has light freckles across the nose and upper cheeks. Natural straight nose, medium soft pink lips with a subtle cupid’s bow.

BODY TYPE & CLOTHING:
BODY: A soft and curvy hourglass figure. Naturally fuller upper-body proportions. A slim, gently tapered waist creating visible contrast with the upper body and hips. Soft, natural skin texture. 

CLOTHING: The clothing should resemble the garment type in Image 2 but MUST be slightly altered in color. The clothing must perfectly fit the curvy hourglass figure described above.

POSE, EXPRESSION AND ATMOSPHERE (Take ONLY the "Action/Emotion" from Image 2):
Recreate the exact pose, body language, camera angle, and lighting/shadows from Image 2. 
EMOTION (CRITICAL): Capture the exact facial expression, emotion, and facial muscle tension from Image 2. However, you must apply this pure emotion to the face from Image 1 WITHOUT transferring any artificial makeup or physical styling from Image 2.

ENVIRONMENT (Take from Image 3 if provided, otherwise Image 2):
If a third image is attached, use that specific location as the background environment. If there is no third image, recreate the background style of the second image. The environmental lighting and day/night mood must always match the lighting hitting the person.

Highly detailed, 4k photorealistic.`;


const textEsmer = `A COMPLETELY NEW image will be created from scratch. DO NOT edit, paint over, or alter the provided images. Generate a brand new photograph based on the following strict rules:

PERSON IDENTITY, HEAD & HAIR (Take ONLY from Prompt and Image 1):
The person is a young woman with a soft oval face shape, fair light neutral skin with highly detailed natural skin texture, visible pores, subtle cheek texture and mild natural redness. Warm brown almond eyes, natural medium-thickness straight eyebrows. 

HAIR & MAKEUP (CRITICAL STRICT RULE): Long straight medium brown hair. The hairstyle, hair length and entire physical appearance of the head MUST come exclusively from Image 1. ABSOLUTELY DO NOT copy the hairstyle, bangs, makeup, eyeliner, glitter, or any facial styling from Image 2.

FACIAL DETAILS: Subtle natural skin irregularities on cheeks, minimal realistic imperfections. Natural straight narrow nose, medium soft pink lips with gentle cupid’s bow, lower lip slightly fuller.

BODY TYPE & CLOTHING:
BODY: A soft and curvy hourglass figure. Naturally fuller upper-body proportions. A slim, gently tapered waist creating visible contrast with the upper body and hips. Soft, natural skin texture. 

CLOTHING: The clothing should resemble the garment type in Image 2 but MUST be slightly altered in color. The clothing must perfectly fit the curvy hourglass figure described above.

POSE, EXPRESSION AND ATMOSPHERE (Take ONLY the "Action/Emotion" from Image 2):
Recreate the exact pose, body language, camera angle, and lighting/shadows from Image 2. 

EMOTION (CRITICAL): Capture the exact facial expression, emotion, and facial muscle tension from Image 2. However, you must apply this pure emotion to the face from Image 1 WITHOUT transferring any artificial makeup or physical styling from Image 2.

ENVIRONMENT (Take from Image 3 if provided, otherwise Image 2):
If a third image is attached, use that specific location as the background environment. If there is no third image, recreate the background style of the second image. The environmental lighting and day/night mood must always match the lighting hitting the person.

Highly detailed, 4k photorealistic.`;


const kizilImg = "https://img.webme.com/pic/b/bg-resim-yukleme/1-KIZIL.png";
const sarisinImg = "https://img.webme.com/pic/b/bg-resim-yukleme/2-SARISIN.png";
const esmerImg = "https://img.webme.com/pic/b/bg-resim-yukleme/3-ESMER.png";


async function copyText(text, btn){
  try{
    await navigator.clipboard.writeText(text);
    const old = btn.textContent;
    btn.textContent = "KOPYALANDI";
    setTimeout(()=> btn.textContent = old, 700);
  } catch (e) {

    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);

    const old = btn.textContent;
    btn.textContent = "KOPYALANDI";
    setTimeout(()=> btn.textContent = old, 700);
  }
}


document.getElementById("btnKizil").onclick = e => copyText(textKizil,e.target);
document.getElementById("btnSarisin").onclick = e => copyText(textSarisin,e.target);
document.getElementById("btnEsmer").onclick = e => copyText(textEsmer,e.target);

document.getElementById("btnKizilResim").onclick = e => copyText(kizilImg,e.target);
document.getElementById("btnSarisinResim").onclick = e => copyText(sarisinImg,e.target);
document.getElementById("btnEsmerResim").onclick = e => copyText(esmerImg,e.target);

</script>

</body>
</html>
